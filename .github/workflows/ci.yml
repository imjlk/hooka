name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate Docker bake file
        run: bun run bake:generate

      - name: Ensure generated Docker bake file is committed
        run: git diff --exit-code -- docker/docker-bake.hcl

      - name: Typecheck
        run: bun run check

      - name: Run tests
        run: bun test

      - name: Build workspace
        run: bun run build

      - name: Smoke test Bun dev UI
        run: bun run test:dev-ui:smoke

      - name: Ensure validation leaves tracked files unchanged
        run: |
          git diff --name-only --exit-code || {
            git status --short
            exit 1
          }

  docker-e2e:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Docker preset E2E
        run: bun run test:e2e:docker

      - name: Ensure Docker E2E leaves tracked files unchanged
        run: |
          git diff --name-only --exit-code || {
            git status --short
            exit 1
          }
