name: Publish Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-mutable:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate Docker bake file
        run: bun run bake:generate

      - name: Ensure generated Docker bake file is committed
        run: git diff --exit-code -- docker/docker-bake.hcl

      - name: Regenerate Dockerfile manifest block
        run: bun run dockerfile:generate

      - name: Ensure generated Dockerfile manifest block is committed
        run: git diff --exit-code -- docker/Dockerfile

      - name: Derive lowercase image repository
        id: image_repo
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish active Hooka images
        env:
          REGISTRY: ghcr.io/${{ steps.image_repo.outputs.value }}
        run: |
          docker buildx bake \
            --file docker/docker-bake.hcl \
            --push \
            --set '*.cache-from=type=gha' \
            --set '*.cache-to=type=gha,mode=max' \
            release

  publish-immutable:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Derive lowercase image repository
        id: image_repo
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish immutable semver aliases
        env:
          REGISTRY: ghcr.io/${{ steps.image_repo.outputs.value }}
          HOOKA_IMAGE_VERSION: ${{ github.ref_name }}
        run: |
          export HOOKA_IMAGE_VERSION="${HOOKA_IMAGE_VERSION#v}"
          bun run scripts/publish-versioned-tags.ts

  cleanup-prereleases:
    needs: publish-immutable
    if: needs.publish-immutable.result == 'success' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/cleanup-ghcr-prereleases.yml
    with:
      release_version: ${{ github.ref_name }}
      apply: true
