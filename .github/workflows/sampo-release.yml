name: Sampo Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: sampo-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Sampo release automation
        id: sampo
        uses: bruits/sampo/crates/sampo-github-action@537fa0a578ca5c60a6885c5477f3cc7ce161be82 # cargo-sampo-github-action-v0.16.0
        with:
          command: auto
          base-branch: main
          pr-branch: codex/release
          pr-title: Release Hooka
          create-github-release: true
          open-discussion: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10

      - name: Read Hooka release state
        id: hooka_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(bun -e 'console.log((await Bun.file("package.json").json()).version)')
          previous_version=$(git show HEAD^:package.json 2>/dev/null | bun -e 'try { console.log((await new Response(Bun.stdin.stream()).json()).version ?? "") } catch { console.log("") }')
          tag="v${version}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --tags --force origin
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if [ -z "${previous_version}" ] || [ "${previous_version}" = "${version}" ]; then
            should_publish=false
          elif git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            should_publish=false
          else
            should_publish=true
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "previous_version=${previous_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes
        if: steps.hooka_release.outputs.should_publish == 'true'
        env:
          HOOKA_RELEASE_VERSION: ${{ steps.hooka_release.outputs.version }}
        run: |
          awk -v version="${HOOKA_RELEASE_VERSION}" '
            $0 ~ "^## " version "([[:space:]]|$)" { print; in_section = 1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md

      - name: Create Hooka release tag
        if: steps.hooka_release.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.hooka_release.outputs.tag }}" -m "Hooka ${{ steps.hooka_release.outputs.version }}"
          git push origin "${{ steps.hooka_release.outputs.tag }}"
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"

      - name: Create GitHub release
        if: steps.hooka_release.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.hooka_release.outputs.tag }}" \
            --title "Hooka ${{ steps.hooka_release.outputs.version }}" \
            --notes-file release-notes.md \
            --latest

      - name: Install dependencies
        if: steps.hooka_release.outputs.should_publish == 'true'
        run: bun install --frozen-lockfile

      - name: Regenerate Docker bake file
        if: steps.hooka_release.outputs.should_publish == 'true'
        run: bun run bake:generate

      - name: Ensure generated Docker bake file is committed
        if: steps.hooka_release.outputs.should_publish == 'true'
        run: git diff --exit-code -- docker/docker-bake.hcl

      - name: Regenerate Dockerfile manifest block
        if: steps.hooka_release.outputs.should_publish == 'true'
        run: bun run dockerfile:generate

      - name: Ensure generated Dockerfile manifest block is committed
        if: steps.hooka_release.outputs.should_publish == 'true'
        run: git diff --exit-code -- docker/Dockerfile

      - name: Derive lowercase image repository
        if: steps.hooka_release.outputs.should_publish == 'true'
        id: image_repo
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.hooka_release.outputs.should_publish == 'true'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        if: steps.hooka_release.outputs.should_publish == 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: steps.hooka_release.outputs.should_publish == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish active Hooka images
        if: steps.hooka_release.outputs.should_publish == 'true'
        env:
          REGISTRY: ghcr.io/${{ steps.image_repo.outputs.value }}
        run: |
          docker buildx bake \
            --file docker/docker-bake.hcl \
            --push \
            --set '*.cache-from=type=gha' \
            --set '*.cache-to=type=gha,mode=max' \
            release

      - name: Publish immutable semver aliases
        if: steps.hooka_release.outputs.should_publish == 'true'
        env:
          REGISTRY: ghcr.io/${{ steps.image_repo.outputs.value }}
          HOOKA_IMAGE_VERSION: ${{ steps.hooka_release.outputs.version }}
        run: bun run scripts/publish-versioned-tags.ts

      - name: Cleanup matching GHCR prerelease aliases
        if: steps.hooka_release.outputs.should_publish == 'true' && !contains(steps.hooka_release.outputs.version, '-')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOOKA_RELEASE_VERSION: ${{ steps.hooka_release.outputs.version }}
          HOOKA_CLEANUP_APPLY: "true"
        run: bun run scripts/cleanup-ghcr-prereleases.ts
