name: Sampo Changeset

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

jobs:
  changeset:
    runs-on: ubuntu-latest
    env:
      HOOKA_PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Check Sampo changeset
        run: bun run changeset:check
