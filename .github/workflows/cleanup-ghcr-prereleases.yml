name: Cleanup GHCR Pre-release Images

on:
  workflow_call:
    inputs:
      release_version:
        description: Stable release version to preserve, such as 1.0.0 or v1.0.0
        required: true
        type: string
      apply:
        description: Delete matching prerelease image aliases instead of dry-running
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      release_version:
        description: Stable release version to preserve, such as 1.0.0 or v1.0.0
        required: true
        type: string
      apply:
        description: Delete matching prerelease image aliases instead of dry-running
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cleanup matching GHCR prerelease aliases
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HOOKA_RELEASE_VERSION: ${{ inputs.release_version }}
          HOOKA_CLEANUP_APPLY: ${{ inputs.apply && 'true' || 'false' }}
        run: bun run scripts/cleanup-ghcr-prereleases.ts
