services:
  hooka-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: webhook-server
    ports:
      - "3000:3000"
    environment:
      HOOKA_DB_PATH: /data/hooka.sqlite
      HOOKA_WEBHOOK_SECRET: ${HOOKA_WEBHOOK_SECRET}
      HOOKA_ADMIN_TOKEN: ${HOOKA_ADMIN_TOKEN}
      HOOKA_TARGETS_PATH: /app/.hooka/targets.json
      HOOKA_INSTALLED_CAPABILITIES: wrangler
      HOOKA_PORT: "3000"
    volumes:
      - hooka-data:/data
      - ./.hooka:/app/.hooka

  hooka-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker-preset
      args:
        HOOKA_FEATURES: wrangler
        HOOKA_IMAGE_LABEL: hooka:local-cf-pages
        HOOKA_RUNTIME_ROLE: cf-pages
        HOOKA_INSTALLED_CAPABILITIES: wrangler
    environment:
      HOOKA_DB_PATH: /data/hooka.sqlite
      HOOKA_WEBHOOK_SECRET: ${HOOKA_WEBHOOK_SECRET}
      HOOKA_POLL_INTERVAL_MS: "2000"
      HOOKA_RUN_LEASE_MS: "900000"
      HOOKA_RUN_MAX_ATTEMPTS: "${HOOKA_RUN_MAX_ATTEMPTS:-3}"
      HOOKA_RETRY_BASE_DELAY_MS: "${HOOKA_RETRY_BASE_DELAY_MS:-5000}"
      HOOKA_WORKER_HEARTBEAT_MS: "${HOOKA_WORKER_HEARTBEAT_MS:-10000}"
      HOOKA_TARGETS_PATH: /app/.hooka/targets.json
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
    volumes:
      - hooka-data:/data
      - ./.hooka:/app/.hooka
      - ./.hooka/shared-source:/shared-source

volumes:
  hooka-data:
